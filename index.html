<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedBridge AI — Doctor Mode MVP</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- marked.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --card: #1c2128;
        --border: #30363d;
        --primary-text: #e6edf3;
        --muted-text: #8b949e;
        --blue-accent: #4493f8;
        --green: #3fb950;
        --amber: #d29922;
        --red: #f85149;
        --output-bg: #010409;
      }
      
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg);
        color: var(--primary-text);
        font-family: 'IBM Plex Sans', sans-serif;
        font-weight: 400;
        line-height: 1.5;
        overflow-x: hidden;
      }

      /* Base styles and reset removed from App.jsx styles for simplicity, App.jsx will inject component specific styles */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
